server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback. index.html must NEVER be cached, or browsers can load a
    # stale shell that references deleted/old asset bundles.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Reverse-proxy the API to the backend container.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE requirements ---
        # Disable buffering so events are flushed to the client immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        # Long read timeout so idle streams aren't dropped mid-job.
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
