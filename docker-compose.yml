services:
  backend:
    build:
      context: ./backend
    image: sse-state-demo-backend
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/jobs.db
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    image: sse-state-demo-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  backend-data:
